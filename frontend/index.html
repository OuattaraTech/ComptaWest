<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons : ICO en premier (compat maximale tous navigateurs), puis
         SVG vectoriel (Chrome/Firefox modernes), puis PNG aux tailles
         standards. apple-touch-icon dédié pour l'écran d'accueil iOS.
         Le ?v=2 force le rafraîchissement du cache après refonte du logo. -->
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="mask-icon" href="/favicon.svg?v=2" color="#0F8A6E" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0F8A6E" />
    <meta name="msapplication-TileColor" content="#0F8A6E" />

    <!-- SEO de base : titre + description + mots-clés ciblés CI/SYSCOHADA -->
    <title>ApeX — Logiciel de comptabilité SYSCOHADA pour PME ivoiriennes</title>
    <meta name="description" content="ApeX est le logiciel de comptabilité et de gestion pensé pour les PME de Côte d'Ivoire : facturation FNE certifiée DGI, paie CNPS, Mobile Money (Wave, Orange, MTN), comptabilité SYSCOHADA, déclarations fiscales. Essai gratuit, sans carte bancaire." />
    <meta name="keywords" content="comptabilité Côte d'Ivoire, SYSCOHADA, logiciel comptable PME, facturation FNE, DGI, CNPS, paie ivoirienne, Mobile Money, Wave, Orange Money, MTN MoMo, OHADA, expert-comptable Abidjan" />
    <meta name="author" content="ApeX" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://apex.ci/" />

    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://apex.ci/" />
    <meta property="og:title" content="ApeX — Comptabilité SYSCOHADA pour PME ivoiriennes" />
    <meta property="og:description" content="Émettez vos factures, suivez vos encaissements Mobile Money, sortez vos bulletins CNPS et clôturez vos comptes SYSCOHADA — sans changer d'outil." />
    <meta property="og:image" content="https://apex.ci/logos/apex.png" />
    <meta property="og:image:alt" content="Logo ApeX" />
    <meta property="og:locale" content="fr_CI" />
    <meta property="og:site_name" content="ApeX" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ApeX — Comptabilité SYSCOHADA pour PME ivoiriennes" />
    <meta name="twitter:description" content="Facturation FNE certifiée DGI, paie CNPS, Mobile Money, comptabilité SYSCOHADA. Tout en un, hébergé en Afrique." />
    <meta name="twitter:image" content="https://apex.ci/logos/apex.png" />

    <!-- Données structurées Schema.org : SoftwareApplication + Organization
         pour les rich snippets Google (étoiles, prix, etc.) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "ApeX",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "description": "Logiciel de comptabilité SYSCOHADA conçu pour les PME de Côte d'Ivoire : facturation FNE, paie CNPS, Mobile Money, déclarations DGI.",
          "url": "https://apex.ci/",
          "offers": {
            "@type": "Offer",
            "price": "9000",
            "priceCurrency": "XOF",
            "priceValidUntil": "2026-12-31",
            "availability": "https://schema.org/InStock"
          },
          "inLanguage": ["fr-CI", "en"]
        },
        {
          "@type": "Organization",
          "name": "ApeX",
          "url": "https://apex.ci/",
          "logo": "https://apex.ci/logos/apex.png",
          "areaServed": { "@type": "Country", "name": "Côte d'Ivoire" },
          "knowsAbout": ["SYSCOHADA", "FNE DGI", "CNPS", "Mobile Money"],
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "areaServed": "CI",
            "availableLanguage": ["French", "English"]
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Sora', sans-serif; background: #0B0F1A; color: #E8EDF5; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0B0F1A; }
      ::-webkit-scrollbar-thumb { background: #1E2D40; border-radius: 3px; }
      select option { background: #111827; color: #E8EDF5; }

      /* ─── Responsive global ──────────────────────────────────────────
         Règles appliquées à toutes les pages sans avoir à toucher leur
         JSX individuel. Les classes utilitaires .cw-page et les sélecteurs
         génériques (table, .recharts) prennent le relais sur mobile. */

      /* Padding des pages : réduit sur tablette et plus encore sur mobile */
      @media (max-width: 900px) {
        [class*="cw-page"], main > div { padding: 20px 16px !important; }
      }
      @media (max-width: 480px) {
        [class*="cw-page"], main > div { padding: 16px 12px !important; }
      }

      /* Tableaux : sur mobile, on autorise un scroll horizontal et on
         garde une largeur minimale pour ne pas écraser les colonnes.
         La règle :has(> table) cible le parent direct d'un <table> pour
         le passer en overflow-x: auto (au lieu du hidden hérité). */
      @media (max-width: 900px) {
        table { min-width: 600px; }
        div:has(> table) { overflow-x: auto !important; }
      }

      /* Cartes de page (header de page, etc.) : champs en flex-wrap */
      @media (max-width: 700px) {
        /* Empile les en-têtes de page (titre + actions) qui débordent */
        h1 + p { font-size: 12px !important; }
      }

      /* Recharts : laisse les graphiques respirer un peu en bas */
      .recharts-responsive-container { min-width: 0 !important; }

      /* Formulaires en grille : sur mobile (≤ 600 px), on empile les
         grilles à colonnes fixes 1fr/2fr/3fr qui deviendraient illisibles.
         On cible le style inline via [style*="..."] — React sérialise
         camelCase en kebab-case dans l'attribut, donc on matche les deux. */
      @media (max-width: 600px) {
        [style*="1fr 1fr 1fr"],
        [style*="2fr 1fr 1fr"],
        [style*="1fr 1fr 1fr 1fr"],
        [style*="3fr 2fr"],
        [style*="2fr 1fr"]:not(.cw-keep-grid) {
          grid-template-columns: 1fr !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
