<?xml version="1.0" encoding="UTF-8"?>
<!-- Favicon ApeX — version officielle (mai 2026).
     Pictogramme A-montagne : sommet vert clair + base blanche en V,
     sur fond noir carré arrondi. Vectoriel pour rester net du 16x16
     jusqu'au 512x512. Couleurs alignées sur le logo source WhatsApp
     fourni par le porteur du projet. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#000000"/>
  <!-- Sommet de la montagne (triangle pointu vert clair) -->
  <path d="M32 18 L40 32 L24 32 Z" fill="#8DE645"/>
  <!-- Base de la montagne (V blanc avec ouverture centrale) -->
  <path d="M32 28 L52 50 L43 50 L32 38 L21 50 L12 50 Z" fill="#FFFFFF"/>
</svg>
